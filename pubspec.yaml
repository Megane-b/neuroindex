name: neuroindex
description: "An index of neuroscience professionals"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  firebase_core: ^4.11.0  
  cloud_firestore: ^6.6.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/neuroindex2.png"
  remove_alpha_ios: true
  

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
